name: Auto Update Data Snapshot

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 한국 시간 오전 9시 (UTC 00:00) 실행
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Update Script
        env:
          SUMMARY_URL: ${{ secrets.SHEET_SUMMARY_URL }}
          HOLDINGS_URL: ${{ secrets.SHEET_HOLDINGS_URL }}
          HISTORY_URL: ${{ secrets.SHEET_HISTORY_URL }}
        run: |
          cat << 'EOF' > update_snapshot.js
          const fs = require('fs');

          const CONFIG = {
              summary: process.env.SUMMARY_URL,
              holdings: process.env.HOLDINGS_URL,
              history: process.env.HISTORY_URL
          };

          async function fetchCSV(url) {
              if (!url) {
                  console.error("URL is missing for a component");
                  return "";
              }
              const response = await fetch(url);
              if (!response.ok) {
                  throw new Error(`Failed to fetch ${url}: ${response.statusText}`);
              }
              return await response.text();
          }

          function parseCSV(csvText) {
              if (!csvText || csvText.trim().startsWith("<!DOCTYPE")) {
                  console.error("Received HTML instead of CSV or empty data");
                  return [];
              }
              return csvText.split('\n').map(row => {
                  const parts = [];
                  let currentPart = '';
                  let insideQuotes = false;
                  for (let i = 0; i < row.length; i++) {
                      const char = row[i];
                      if (char === '"') {
                          insideQuotes = !insideQuotes;
                      } else if (char === ',' && !insideQuotes) {
                          parts.push(currentPart.trim().replace(/^"|"$/g, ''));
                          currentPart = '';
                      } else {
                          currentPart += char;
                      }
                  }
                  parts.push(currentPart.trim().replace(/^"|"$/g, ''));
                  return parts;
              });
          }

          async function run() {
              try {
                  console.log('Fetching data from Google Sheets...');
                  const [s, h, hist] = await Promise.all([
                      fetchCSV(CONFIG.summary),
                      fetchCSV(CONFIG.holdings),
                      fetchCSV(CONFIG.history)
                  ]);
                  
                  const snapshot = {
                      summary: parseCSV(s),
                      holdings: parseCSV(h),
                      history: parseCSV(hist),
                      updatedAt: new Date().toISOString()
                  };
                  
                  fs.writeFileSync('data_snapshot.json', JSON.stringify(snapshot, null, 2));
                  console.log('Successfully updated data_snapshot.json');
              } catch (e) {
                  console.error('Update failed:', e);
                  process.exit(1);
              }
          }
          run();
          EOF

      - name: Run Update Script
        run: node update_snapshot.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_snapshot.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto update data snapshot [skip ci]"
          git push
