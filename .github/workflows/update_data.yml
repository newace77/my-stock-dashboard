name: Auto Update Data Snapshot

on:
  schedule:
    - cron: '*/15 * * * *'  # 15분마다 실행
  workflow_dispatch:      # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      SUMMARY_URL: ${{ secrets.SHEET_SUMMARY_URL }}
      HOLDINGS_URL: ${{ secrets.SHEET_HOLDINGS_URL }}
      HISTORY_URL: ${{ secrets.SHEET_HISTORY_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Create Update Script
        run: |
          cat << 'EOF' > update_snapshot.js
          const fs = require('fs');

          const CONFIG = {
              summary: process.env.SUMMARY_URL,
              holdings: process.env.HOLDINGS_URL,
              history: process.env.HISTORY_URL
          };

          async function fetchCSV(name, url) {
              if (!url) {
                  console.error(`URL for ${name} is missing in environment variables.`);
                  return "";
              }
              try {
                  const response = await fetch(url);
                  if (!response.ok) {
                      throw new Error(`Failed to fetch ${name} (${url}): ${response.statusText}`);
                  }
                  return await response.text();
              } catch (err) {
                  console.error(`Error fetching ${name}:`, err.message);
                  return "";
              }
          }

          function parseCSV(csvText) {
              if (!csvText || csvText.trim().startsWith("<!DOCTYPE")) {
                  console.error("Received HTML instead of CSV or empty data");
                  return [];
              }
              return csvText.split('\n').map(row => {
                  const parts = [];
                  let currentPart = '';
                  let insideQuotes = false;
                  for (let i = 0; i < row.length; i++) {
                      const char = row[i];
                      if (char === '"') {
                          insideQuotes = !insideQuotes;
                      } else if (char === ',' && !insideQuotes) {
                          parts.push(currentPart.trim().replace(/^"|"$/g, ''));
                          currentPart = '';
                      } else {
                          currentPart += char;
                      }
                  }
                  parts.push(currentPart.trim().replace(/^"|"$/g, ''));
                  return parts;
              });
          }

          async function run() {
              try {
                  console.log('Fetching data from Google Sheets...');
                  const [s, h, hist] = await Promise.all([
                      fetchCSV('Summary', CONFIG.summary),
                      fetchCSV('Holdings', CONFIG.holdings),
                      fetchCSV('History', CONFIG.history)
                  ]);
                  
                  if (!s || !h || !hist) {
                      console.error('One or more data sources could not be fetched.');
                      process.exit(1);
                  }

                  const summaryData = parseCSV(s);
                  const holdingsData = parseCSV(h);
                  const historyData = parseCSV(hist);

                  // 데이터 유효성 검사: 최소한의 행이 있는지 확인
                  if (summaryData.length < 5 || holdingsData.length < 2) {
                      console.error('Fetched data looks incomplete or empty. Skipping update.');
                      console.log('Summary rows:', summaryData.length);
                      console.log('Holdings rows:', holdingsData.length);
                      process.exit(1); 
                  }
                  
                  const snapshot = {
                      summary: summaryData,
                      holdings: holdingsData,
                      history: historyData,
                      updatedAt: new Date().toISOString()
                  };
                  
                  fs.writeFileSync('data_snapshot.json', JSON.stringify(snapshot, null, 2));
                  console.log('Successfully updated data_snapshot.json with ' + summaryData.length + ' summary rows');
              } catch (e) {
                  console.error('Update failed:', e);
                  process.exit(1);
              }
          }
          run();
          EOF

      - name: Run Update Script
        run: node update_snapshot.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_snapshot.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto update data snapshot [skip ci]"
          git push
