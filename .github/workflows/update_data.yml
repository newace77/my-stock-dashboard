name: Auto Update Data Snapshot

on:
  schedule:
    - cron: '*/15 * * * *'  # 15분마다 실행
  workflow_dispatch:        # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Update Script (Google Sheets Snapshot)
        env:
          SUMMARY_URL: ${{ secrets.SHEET_SUMMARY_URL }}
          HOLDINGS_URL: ${{ secrets.SHEET_HOLDINGS_URL }}
          HISTORY_URL: ${{ secrets.SHEET_HISTORY_URL }}
        run: python update_prices.py

      - name: Validate snapshot
        run: |
          python - <<'EOF'
          import json, sys
          with open("data_snapshot.json", encoding="utf-8") as f:
              snap = json.load(f)
          required = {"summary", "holdings", "history", "timestamp"}
          missing = required - snap.keys()
          if missing:
              print(f"Snapshot missing keys: {missing}", file=sys.stderr)
              sys.exit(1)
          if len(snap["summary"]) < 3:
              print("summary data too short", file=sys.stderr)
              sys.exit(1)
          if len(snap["holdings"]) < 2:
              print("holdings data too short", file=sys.stderr)
              sys.exit(1)
          print(f"Snapshot valid — summary:{len(snap['summary'])} rows, holdings:{len(snap['holdings'])} rows, history:{len(snap['history'])} rows")
          EOF

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data_snapshot.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto update data snapshot [skip ci]"
          git push
